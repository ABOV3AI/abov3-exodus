version: '3.8'

# ABOV3 Exodus - Full Installation (With PostgreSQL Database)
#
# This configuration includes:
# - ABOV3 Exodus application
# - PostgreSQL database for authentication and cloud backup
# - Automatic database initialization and migrations
#
# Features enabled with database:
# - User authentication (email/password + magic link)
# - Multi-user support with account isolation
# - Cloud backup for conversations
# - Admin panel for SMTP configuration
# - Chat sharing (future feature)
#
# To start: docker-compose -f docker-compose-full.yaml up -d
# To stop:  docker-compose -f docker-compose-full.yaml down
# To remove data: docker-compose -f docker-compose-full.yaml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: abov3-exodus-db
    environment:
      # Database credentials
      # Change these for production!
      POSTGRES_USER: abov3_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abov3_secure_password_change_me}
      POSTGRES_DB: abov3_exodus

      # PostgreSQL configuration
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"

    ports:
      # Expose PostgreSQL port for debugging (optional)
      # Comment out this line if you don't need external database access
      - "5432:5432"

    volumes:
      # Persistent database storage
      - postgres_data:/var/lib/postgresql/data

      # Optional: Custom initialization scripts
      # - ./init-scripts:/docker-entrypoint-initdb.d

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abov3_user -d abov3_exodus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    labels:
      - "com.abov3.exodus.service=database"
      - "com.abov3.exodus.version=1.0"

    networks:
      - abov3-network

  abov3-exodus:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Optional: Set these at build time for custom branding
        # NEXT_PUBLIC_GA4_MEASUREMENT_ID: ""
        # NEXT_PUBLIC_POSTHOG_KEY: ""

    container_name: abov3-exodus-full

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3006:3000"

    environment:
      # Node environment
      - NODE_ENV=production
      - NEXT_PUBLIC_DEPLOYMENT_TYPE=docker

      # Database connection
      # Prisma connection pooling (for serverless/edge functions)
      - POSTGRES_PRISMA_URL=postgresql://abov3_user:${POSTGRES_PASSWORD:-abov3_secure_password_change_me}@postgres:5432/abov3_exodus?pgbouncer=true&connection_limit=1

      # Direct database connection (for migrations and direct queries)
      - POSTGRES_URL_NON_POOLING=postgresql://abov3_user:${POSTGRES_PASSWORD:-abov3_secure_password_change_me}@postgres:5432/abov3_exodus

      # Alternative: Single DATABASE_URL (works for both)
      - DATABASE_URL=postgresql://abov3_user:${POSTGRES_PASSWORD:-abov3_secure_password_change_me}@postgres:5432/abov3_exodus

      # NextAuth configuration
      # IMPORTANT: Change NEXTAUTH_SECRET for production!
      # Generate with: openssl rand -base64 32
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-default_secret_key_CHANGE_THIS_IN_PRODUCTION_use_openssl_rand_base64_32}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3006}

      # Optional: Email configuration (can also configure via Admin Panel)
      # SMTP settings for magic link authentication and notifications
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@abov3-exodus.com}

      # Optional: AI model API keys (can also set in UI)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}

    volumes:
      # Optional: Persist Prisma migrations
      - ./src/server/prisma:/app/src/server/prisma

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    labels:
      - "com.abov3.exodus.mode=full"
      - "com.abov3.exodus.version=1.0"
      - "com.abov3.exodus.description=ABOV3 Exodus - Full mode with database and authentication"

    networks:
      - abov3-network

    # Run database migrations on startup
    command: >
      sh -c "
        echo 'Starting ABOV3 Exodus...' &&
        echo 'Running database migrations...' &&
        npx prisma db push --accept-data-loss &&
        echo 'Generating Prisma Client...' &&
        npx prisma generate &&
        echo 'Starting application...' &&
        next start
      "

volumes:
  postgres_data:
    driver: local
    labels:
      - "com.abov3.exodus.data=postgresql"
      - "com.abov3.exodus.version=1.0"

networks:
  abov3-network:
    driver: bridge
    labels:
      - "com.abov3.exodus.network=main"
