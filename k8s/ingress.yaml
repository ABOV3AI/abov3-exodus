apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: abov3-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - exodus.abov3.ai
        - eden.abov3.ai
        - pauline.abov3.ai
      secretName: abov3-tls-secret
  rules:
    # ABOV3 Exodus - Main application
    - host: exodus.abov3.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: abov3-exodus
                port:
                  number: 80

    # ABOV3 Eden - MCP Server
    - host: eden.abov3.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: abov3-eden
                port:
                  number: 80

    # ABOV3 Pauline - TTS Service
    - host: pauline.abov3.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: abov3-pauline
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: fahad.fajardo@abov3.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: traefik
