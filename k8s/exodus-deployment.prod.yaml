---
# Notes and Usage Instructions
#
# Prerequisites:
# 1. Kubernetes cluster (DigitalOcean)
# 2. kubectl configured with cluster access
# 3. Secrets created (auth-secrets, db-credentials)
# 4. Docker image pushed to ghcr.io/abov3ai/exodus
#
# Create Secrets:
#   kubectl create secret generic auth-secrets \
#     --from-literal=nextauth-secret="$(openssl rand -base64 32)"
#
#   kubectl create secret generic db-credentials \
#     --from-literal=url="postgresql://..." \
#     --from-literal=direct-url="postgresql://..." \
#     --from-literal=read-url="postgresql://..."
#
# Deploy:
#   kubectl apply -f k8s/exodus-deployment.prod.yaml
#
# Check Status:
#   kubectl get deployment abov3-exodus
#   kubectl get pods -l app=abov3-exodus
#   kubectl get svc abov3-exodus
#
# View Logs:
#   kubectl logs -f deployment/abov3-exodus
#   kubectl logs -f <pod-name>
#
# Update Image:
#   kubectl set image deployment/abov3-exodus \
#     exodus=ghcr.io/abov3ai/exodus:v2.1.0 --record
#
# Watch Rollout:
#   kubectl rollout status deployment/abov3-exodus
#   kubectl rollout history deployment/abov3-exodus
#
# Rollback:
#   kubectl rollout undo deployment/abov3-exodus
#   kubectl rollout undo deployment/abov3-exodus --to-revision=2
#
# Scale Manually:
#   kubectl scale deployment abov3-exodus --replicas=3
#
# Port Forward (for testing):
#   kubectl port-forward svc/abov3-exodus 3000:80
#   curl http://localhost:3000/api/health
#
# Debugging:
#   kubectl describe deployment abov3-exodus
#   kubectl describe pod <pod-name>
#   kubectl exec -it <pod-name> -- /bin/sh
#
# Delete:
#   kubectl delete -f k8s/exodus-deployment.prod.yaml
#
