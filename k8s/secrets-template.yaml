# IMPORTANT: Do not commit this file with real values!
# Copy this file to secrets.yaml and fill in the values.
# Then apply with: kubectl apply -f secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  nextauth-secret: "REPLACE_WITH_32_CHAR_SECRET"

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  # Connection pooling URL for writes (primary node)
  url: "postgresql://USER:PASSWORD@HOST:5432/DATABASE?pgbouncer=true"
  # Direct URL (for migrations - connects to primary directly)
  direct-url: "postgresql://USER:PASSWORD@HOST:5432/DATABASE"
  # Read replica URL (optional - for HA setups with read/write separation)
  # If not set, reads will use the primary URL above
  read-url: "postgresql://USER:PASSWORD@READ_REPLICA_HOST:5432/DATABASE?pgbouncer=true"
  password: "REPLACE_WITH_DB_PASSWORD"
  # Replication password (for HA setups)
  replication-password: "REPLACE_WITH_REPLICATION_PASSWORD"
