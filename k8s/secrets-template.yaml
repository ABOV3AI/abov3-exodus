# IMPORTANT: Do not commit this file with real values!
# Copy this file to secrets.yaml and fill in the values.
# Then apply with: kubectl apply -f secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  nextauth-secret: "REPLACE_WITH_32_CHAR_SECRET"

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  # Connection pooling URL (for most queries)
  url: "postgresql://USER:PASSWORD@HOST:5432/DATABASE?pgbouncer=true"
  # Direct URL (for migrations)
  direct-url: "postgresql://USER:PASSWORD@HOST:5432/DATABASE"
  password: "REPLACE_WITH_DB_PASSWORD"
