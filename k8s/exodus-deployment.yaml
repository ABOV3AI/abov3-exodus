apiVersion: apps/v1
kind: Deployment
metadata:
  name: abov3-exodus
  labels:
    app: abov3-exodus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: abov3-exodus
  template:
    metadata:
      labels:
        app: abov3-exodus
    spec:
      containers:
        - name: exodus
          image: ghcr.io/abov3ai/exodus:beta
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            # SECURITY: Disable local model endpoints in cloud deployment
            # This prevents SSRF attacks by blocking localhost/private IP requests
            - name: NEXT_PUBLIC_DEPLOYMENT_MODE
              value: "cloud"
            - name: NEXTAUTH_URL
              value: "https://exodus.abov3.ai"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: nextauth-secret
            - name: POSTGRES_PRISMA_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: POSTGRES_URL_NON_POOLING
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: direct-url
            # High Availability: Read Replica URL (optional)
            # Routes read operations to replica for better performance
            - name: POSTGRES_READ_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: read-url
                  optional: true  # Falls back to primary if not set
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: abov3-exodus
spec:
  selector:
    app: abov3-exodus
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
