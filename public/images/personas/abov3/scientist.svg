<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Nucleus with glow -->
  <circle cx="60" cy="60" r="7" fill="#00d4ff">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Rotating electron orbits -->
  <ellipse cx="60" cy="60" rx="40" ry="20" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="60" cy="60" rx="40" ry="20" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="60 60 60" to="420 60 60" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="60" cy="60" rx="40" ry="20" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="120 60 60" to="480 60 60" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Orbiting electrons moving along elliptical paths -->
  <!-- Electron 1 - on first orbit -->
  <circle r="5" fill="#ffffff">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 100,60 A 40,20 0 1,1 20,60 A 40,20 0 1,1 100,60"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Electron 2 - on second orbit (rotated 60 degrees) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" repeatCount="indefinite"/>
    <circle r="5" fill="#ffffff">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 100,60 A 40,20 0 1,1 20,60 A 40,20 0 1,1 100,60" begin="-1.3s"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Electron 3 - on third orbit (rotated 120 degrees) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" repeatCount="indefinite"/>
    <circle r="5" fill="#ffffff">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 100,60 A 40,20 0 1,1 20,60 A 40,20 0 1,1 100,60" begin="-2.6s"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
