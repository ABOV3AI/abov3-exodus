<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Animated pen tool path drawing -->
  <path d="M 45 70 L 55 50 L 60 40 L 65 50 L 75 70" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Animated pen tool handles -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="2.5s" repeatCount="indefinite"/>
    <line x1="55" y1="50" x2="50" y2="45" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="50" cy="45" r="2.5" fill="#ffffff"/>
    <line x1="65" y1="50" x2="70" y2="45" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="70" cy="45" r="2.5" fill="#ffffff"/>
  </g>

  <!-- Anchor points appearing -->
  <circle cx="45" cy="70" r="3" fill="#00d4ff" stroke="#ffffff" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <animate attributeName="r" values="0;4;3" dur="0.3s" begin="0.5s" fill="freeze"/>
  </circle>
  <circle cx="60" cy="40" r="3" fill="#00d4ff" stroke="#ffffff" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="0.5s" begin="1s" fill="freeze"/>
    <animate attributeName="r" values="0;4;3" dur="0.3s" begin="1s" fill="freeze"/>
  </circle>
  <circle cx="75" cy="70" r="3" fill="#00d4ff" stroke="#ffffff" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <animate attributeName="r" values="0;4;3" dur="0.3s" begin="1.5s" fill="freeze"/>
  </circle>

  <!-- Color palette dots with pulse -->
  <circle cx="40" cy="35" r="3" fill="#00d4ff">
    <animate attributeName="r" values="3;3.5;3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="33" r="3" fill="#ffffff">
    <animate attributeName="r" values="3;3.5;3" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="32" r="3" fill="#00d4ff" opacity="0.6">
    <animate attributeName="r" values="3;3.5;3" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">DESIGNER</text>
</svg>
