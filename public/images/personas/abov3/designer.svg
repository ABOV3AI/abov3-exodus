<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Animated pen tool path drawing -->
  <path d="M 30 85 L 45 55 L 60 30 L 75 55 L 90 85" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linejoin="round" stroke-dasharray="150" stroke-dashoffset="150">
    <animate attributeName="stroke-dashoffset" values="150;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Animated pen tool handles -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="2.5s" repeatCount="indefinite"/>
    <line x1="45" y1="55" x2="38" y2="48" stroke="#ffffff" stroke-width="2"/>
    <circle cx="38" cy="48" r="3" fill="#ffffff"/>
    <line x1="75" y1="55" x2="82" y2="48" stroke="#ffffff" stroke-width="2"/>
    <circle cx="82" cy="48" r="3" fill="#ffffff"/>
  </g>

  <!-- Anchor points appearing -->
  <circle cx="30" cy="85" r="4" fill="#00d4ff" stroke="#ffffff" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <animate attributeName="r" values="0;5;4" dur="0.3s" begin="0.5s" fill="freeze"/>
  </circle>
  <circle cx="60" cy="30" r="4" fill="#00d4ff" stroke="#ffffff" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="0.5s" begin="1s" fill="freeze"/>
    <animate attributeName="r" values="0;5;4" dur="0.3s" begin="1s" fill="freeze"/>
  </circle>
  <circle cx="90" cy="85" r="4" fill="#00d4ff" stroke="#ffffff" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <animate attributeName="r" values="0;5;4" dur="0.3s" begin="1.5s" fill="freeze"/>
  </circle>

  <!-- Color palette dots with pulse -->
  <circle cx="25" cy="20" r="4" fill="#00d4ff">
    <animate attributeName="r" values="4;4.5;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="18" r="4" fill="#ffffff">
    <animate attributeName="r" values="4;4.5;4" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="16" r="4" fill="#00d4ff" opacity="0.6">
    <animate attributeName="r" values="4;4.5;4" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
