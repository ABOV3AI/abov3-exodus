<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Video screen with glow -->
  <rect x="20" y="25" width="80" height="55" rx="4" fill="none" stroke="#00d4ff" stroke-width="3">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated play button -->
  <g>
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1.5s" additive="sum" repeatCount="indefinite"/>
    <polygon points="48,45 48,65 68,55" fill="#ffffff">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Subtitle lines with typewriter effect -->
  <line x1="25" y1="88" x2="25" y2="88" stroke="#00d4ff" stroke-width="2.5" opacity="0.7">
    <animate attributeName="x2" values="25;95" dur="1.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.9" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="30" y1="95" x2="30" y2="95" stroke="#00d4ff" stroke-width="2.5" opacity="0.5">
    <animate attributeName="x2" values="30;90" dur="1.5s" begin="0.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="0.5s" fill="freeze"/>
  </line>

  <!-- Corner brackets (framing) with pulse -->
  <g opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    <path d="M 18 22 L 18 28 M 18 22 L 24 22" stroke="#ffffff" stroke-width="2"/>
    <path d="M 102 22 L 96 22 M 102 22 L 102 28" stroke="#ffffff" stroke-width="2"/>
    <path d="M 18 82 L 18 76 M 18 82 L 24 82" stroke="#ffffff" stroke-width="2"/>
    <path d="M 102 82 L 96 82 M 102 82 L 102 76" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Scanning line effect -->
  <line x1="20" y1="25" x2="100" y2="25" stroke="#00d4ff" stroke-width="1.5" opacity="0.3">
    <animate attributeName="y1" values="25;80;25" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="25;80;25" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
