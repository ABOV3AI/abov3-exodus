<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Briefcase with subtle breathing -->
  <rect x="40" y="45" width="40" height="25" rx="2" fill="#00d4ff" stroke="#ffffff" stroke-width="2">
    <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="2s" additive="sum" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Briefcase handle -->
  <path d="M 52 45 L 52 40 Q 60 35 68 40 L 68 45" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Briefcase lock -->
  <rect x="58" y="53" width="4" height="6" fill="#0a0e27"/>
  <circle cx="60" cy="53" r="2" fill="#0a0e27">
    <animate attributeName="r" values="2;2.5;2" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated rising chart -->
  <path d="M 35 65 L 45 60 L 55 58 L 65 52 L 75 48 L 85 45" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.7" stroke-dasharray="50" stroke-dashoffset="50">
    <animate attributeName="stroke-dashoffset" values="50;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Chart points appearing -->
  <circle cx="45" cy="60" r="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
  </circle>
  <circle cx="55" cy="58" r="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
  </circle>
  <circle cx="65" cy="52" r="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>
  </circle>
  <circle cx="75" cy="48" r="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
  </circle>
  <circle cx="85" cy="45" r="2.5" fill="#ffffff">
    <animate attributeName="opacity" values="0;1;1" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="0;3;2.5" dur="0.5s" begin="2.5s" fill="freeze"/>
  </circle>

  <!-- Label -->
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">EXECUTIVE</text>
</svg>
