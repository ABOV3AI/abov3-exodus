<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Briefcase with subtle breathing -->
  <rect x="30" y="35" width="60" height="38" rx="3" fill="#00d4ff" stroke="#ffffff" stroke-width="2.5">
    <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="2s" additive="sum" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Briefcase handle -->
  <path d="M 48 35 L 48 28 Q 60 22 72 28 L 72 35" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Briefcase lock -->
  <rect x="57" y="48" width="6" height="9" fill="#0a0e27"/>
  <circle cx="60" cy="48" r="3" fill="#0a0e27">
    <animate attributeName="r" values="3;3.5;3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated rising chart -->
  <path d="M 20 78 L 35 72 L 50 68 L 65 58 L 80 48 L 100 38" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7" stroke-dasharray="80" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Chart points appearing -->
  <circle cx="35" cy="72" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
  </circle>
  <circle cx="50" cy="68" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
  </circle>
  <circle cx="65" cy="58" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>
  </circle>
  <circle cx="80" cy="48" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
  </circle>
  <circle cx="100" cy="38" r="3.5" fill="#ffffff">
    <animate attributeName="opacity" values="0;1;1" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="0;4;3.5" dur="0.5s" begin="2.5s" fill="freeze"/>
  </circle>
</svg>
