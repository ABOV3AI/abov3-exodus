<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Outer ring with pulse -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="#00d4ff" stroke-width="3">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="45;48;45" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- User silhouette - head -->
  <circle cx="60" cy="50" r="16" fill="#ffffff">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- User silhouette - shoulders/body -->
  <path d="M 30 95 Q 30 75 45 70 Q 60 67 75 70 Q 90 75 90 95" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Glow effect behind user -->
  <circle cx="60" cy="60" r="35" fill="#00d4ff" opacity="0.15">
    <animate attributeName="r" values="32;38;32" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Accent dots - left -->
  <circle cx="25" cy="55" r="3" fill="#00d4ff">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="68" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Accent dots - right -->
  <circle cx="95" cy="55" r="3" fill="#00d4ff">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="68" r="2.5" fill="#00d4ff">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
