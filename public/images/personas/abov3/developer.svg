<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Code brackets with subtle scale -->
  <path d="M 35 35 L 25 45 L 25 55 L 35 65" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="3s" additive="sum" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 85 35 L 95 45 L 95 55 L 85 65" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="3s" additive="sum" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Code lines typing effect -->
  <line x1="45" y1="40" x2="65" y2="40" stroke="#ffffff" stroke-width="2.5" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0.8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="45;65" dur="0.5s" fill="freeze"/>
  </line>
  <line x1="45" y1="50" x2="75" y2="50" stroke="#ffffff" stroke-width="2.5" opacity="0">
    <animate attributeName="opacity" values="0;0;0.8;0.8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="45;75" dur="0.7s" begin="0.5s" fill="freeze"/>
  </line>
  <line x1="45" y1="60" x2="55" y2="60" stroke="#ffffff" stroke-width="2.5" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.8;0.8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="45;55" dur="0.3s" begin="1.2s" fill="freeze"/>
  </line>

  <!-- Blinking cursor -->
  <rect x="58" y="57" width="2" height="6" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Label -->
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">DEVELOPER</text>
</svg>
