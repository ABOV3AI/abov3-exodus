<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Code brackets with subtle scale -->
  <path d="M 30 30 L 15 50 L 15 70 L 30 90" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="3s" additive="sum" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 90 30 L 105 50 L 105 70 L 90 90" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="3s" additive="sum" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Code lines typing effect -->
  <line x1="40" y1="45" x2="70" y2="45" stroke="#ffffff" stroke-width="3" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0.8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="40;70" dur="0.5s" fill="freeze"/>
  </line>
  <line x1="40" y1="60" x2="80" y2="60" stroke="#ffffff" stroke-width="3" opacity="0">
    <animate attributeName="opacity" values="0;0;0.8;0.8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="40;80" dur="0.7s" begin="0.5s" fill="freeze"/>
  </line>
  <line x1="40" y1="75" x2="60" y2="75" stroke="#ffffff" stroke-width="3" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.8;0.8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="40;60" dur="0.3s" begin="1.2s" fill="freeze"/>
  </line>

  <!-- Blinking cursor -->
  <rect x="63" y="71" width="3" height="8" fill="#00d4ff">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
