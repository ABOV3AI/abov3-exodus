<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Brain/AI circuit design with pulse animation -->
  <circle cx="60" cy="45" r="22" fill="none" stroke="#00d4ff" stroke-width="2.5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="45" r="16" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="45" r="10" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural connections with data flow -->
  <line x1="50" y1="55" x2="45" y2="70" stroke="#00d4ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="60" y1="55" x2="60" y2="70" stroke="#00d4ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="70" y1="55" x2="75" y2="70" stroke="#00d4ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </line>

  <!-- Animated nodes -->
  <circle cx="45" cy="70" r="3.5" fill="#00d4ff">
    <animate attributeName="r" values="3;4.5;3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="70" r="3.5" fill="#00d4ff">
    <animate attributeName="r" values="3;4.5;3" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="70" r="3.5" fill="#00d4ff">
    <animate attributeName="r" values="3;4.5;3" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Center dot with glow -->
  <circle cx="60" cy="45" r="4" fill="#ffffff">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">DEFAULT</text>
</svg>
