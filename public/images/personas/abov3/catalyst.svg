<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0e27" rx="20"/>

  <!-- Rocket shape with lift-off animation -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="1.5s" repeatCount="indefinite"/>

    <path d="M 60 15 L 68 35 L 75 60 L 75 75 L 45 75 L 45 60 L 52 35 Z" fill="#00d4ff" stroke="#ffffff" stroke-width="2">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    </path>

    <!-- Rocket window -->
    <circle cx="60" cy="40" r="8" fill="#0a0e27" stroke="#ffffff" stroke-width="2"/>

    <!-- Rocket fins -->
    <path d="M 45 65 L 32 80 L 45 72 Z" fill="#00d4ff" opacity="0.8"/>
    <path d="M 75 65 L 88 80 L 75 72 Z" fill="#00d4ff" opacity="0.8"/>
  </g>

  <!-- Animated exhaust flames -->
  <ellipse cx="60" cy="78" rx="7" ry="10" fill="#ffffff" opacity="0.6">
    <animate attributeName="ry" values="8;12;8" dur="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="0.3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="60" cy="85" rx="10" ry="14" fill="#00d4ff" opacity="0.4">
    <animate attributeName="ry" values="12;18;12" dur="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="0.4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="60" cy="92" rx="12" ry="16" fill="#ffffff" opacity="0.2">
    <animate attributeName="ry" values="14;20;14" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="0.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Upward arrow/trajectory with dash -->
  <path d="M 60 75 L 60 92" stroke="#00d4ff" stroke-width="2.5" opacity="0.5" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="1s" repeatCount="indefinite"/>
  </path>
</svg>
