<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- Gradient definitions for light rays -->
    <linearGradient id="inputBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.9"/>
    </linearGradient>

    <!-- Rainbow spectrum gradients -->
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF7F00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF7F00;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFF00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFFF00;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ray4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00FF00;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ray5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0000FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0000FF;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ray6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4B0082;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ray7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9400D3;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9400D3;stop-opacity:0.8"/>
    </linearGradient>

    <!-- Prism gradient -->
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#7B68EE;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#9370DB;stop-opacity:0.6"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="600" fill="#0A0E27"/>

  <!-- Input query label -->
  <text x="80" y="280" fill="#8B9DC3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Single Query</text>

  <!-- Input light beam (white) -->
  <polygon points="150,300 400,290 400,310" fill="url(#inputBeam)" opacity="0.8" filter="url(#glow)"/>

  <!-- PRISM (triangular prism shape) -->
  <path d="M 400,200 L 500,250 L 500,350 L 400,400 Z"
        fill="url(#prismGrad)"
        stroke="#6C8CD5"
        stroke-width="2"
        opacity="0.9"
        filter="url(#glow)"/>

  <!-- Prism label -->
  <text x="380" y="460" fill="#8B9DC3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" text-anchor="middle">PRISM</text>

  <!-- Output spectrum rays (7 colors) -->
  <!-- Red ray (top) -->
  <polygon points="500,230 1100,150 1100,160 500,240" fill="url(#ray1)" filter="url(#glow)"/>
  <text x="1050" y="145" fill="#FF6B6B" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">GPT-4</text>

  <!-- Orange ray -->
  <polygon points="500,250 1100,210 1100,220 500,260" fill="url(#ray2)" filter="url(#glow)"/>
  <text x="1050" y="205" fill="#FFA07A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Claude</text>

  <!-- Yellow ray -->
  <polygon points="500,270 1100,260 1100,270 500,280" fill="url(#ray3)" filter="url(#glow)"/>
  <text x="1050" y="255" fill="#FFD700" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Gemini</text>

  <!-- Green ray (middle) -->
  <polygon points="500,290 1100,300 1100,310 500,300" fill="url(#ray4)" filter="url(#glow)"/>
  <text x="1050" y="295" fill="#90EE90" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Llama</text>

  <!-- Blue ray -->
  <polygon points="500,310 1100,340 1100,350 500,320" fill="url(#ray5)" filter="url(#glow)"/>
  <text x="1050" y="335" fill="#87CEEB" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Mistral</text>

  <!-- Indigo ray -->
  <polygon points="500,330 1100,390 1100,400 500,340" fill="url(#ray6)" filter="url(#glow)"/>
  <text x="1050" y="385" fill="#9370DB" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">DeepSeek</text>

  <!-- Violet ray (bottom) -->
  <polygon points="500,350 1100,440 1100,450 500,360" fill="url(#ray7)" filter="url(#glow)"/>
  <text x="1050" y="435" fill="#DA70D6" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Perplexity</text>

  <!-- Spectrum label -->
  <text x="900" y="500" fill="#8B9DC3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">AI Model Spectrum</text>

  <!-- Title -->
  <text x="600" y="50" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" text-anchor="middle">PRISM SCATTER PHASE</text>
  <text x="600" y="75" fill="#8B9DC3" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle">Multi-Model Parallel Processing</text>
</svg>
